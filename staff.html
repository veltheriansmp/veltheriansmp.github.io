<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | Veltherian SMP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --modal-bg: #121217;
            --gold: #e2b749;
            --border: rgba(255, 255, 255, 0.08);
            --m3-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; }

        /* PAGE TRANSITION */
        #page-transition { position: fixed; inset: 0; background: var(--bg); z-index: 99999; pointer-events: none; transition: 0.5s var(--m3-ease); }
        body.loaded #page-transition { opacity: 0; transform: translateY(-30px); }

        nav { width: 100%; padding: 15px 25px; display: flex; justify-content: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(12px); z-index: 100; }
        .nav-container { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo img { height: 40px; width: 40px; border-radius: 8px; object-fit: cover; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #fff; text-decoration: none; opacity: 0.5; transition: 0.3s; font-size: 14px; font-weight: 500; }
        .nav-links a.active, .nav-links a:hover { opacity: 1; color: var(--gold); }

        header { text-align: center; padding: 80px 20px 40px; }
        header h1 { font-size: clamp(40px, 8vw, 70px); font-weight: 900; letter-spacing: -3px; text-transform: uppercase; line-height: 0.9; }

        /* GRID */
        .staff-grid { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .staff-card { background: #0d0d11; border: 1px solid var(--border); border-radius: 24px; padding: 30px 20px; cursor: pointer; transition: 0.4s var(--m3-ease); text-align: center; }
        .staff-card:hover { transform: translateY(-8px); border-color: var(--user-color); }
        .card-pfp { width: 100px; height: 100px; border-radius: 25px; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--user-color); }
        .card-rank { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--user-color); display: block; margin-bottom: 5px; }
        .staff-card h3 { font-size: 20px; font-weight: 700; }

        /* FLOATING MODAL OVERLAY */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; place-items: center; z-index: 9999; padding: 20px; opacity: 0; transition: 0.4s; }
        #overlay.active { opacity: 1; display: grid; }

        .modal-floating { 
            background: var(--modal-bg); 
            width: 100%; 
            max-width: 700px; 
            border-radius: 40px; 
            padding: 40px; 
            position: relative; 
            border: 1px solid var(--border);
            display: flex;
            gap: 35px;
            align-items: center;
            transform: translateY(30px) scale(0.95);
            transition: 0.5s var(--m3-ease);
        }
        #overlay.active .modal-floating { transform: translateY(0) scale(1); }

        .modal-pfp-wrap { position: relative; flex-shrink: 0; }
        .modal-pfp { width: 240px; height: 240px; border-radius: 45px; object-fit: cover; border: 3px solid var(--modal-color); }

        .modal-info { flex: 1; }
        .modal-rank { color: var(--modal-color); text-transform: uppercase; font-size: 11px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .modal-name { font-size: 42px; font-weight: 900; margin-bottom: 20px; }
        .modal-bio { opacity: 0.6; font-size: 16px; line-height: 1.6; margin-bottom: 25px; white-space: pre-line; }

        /* PILL BUTTONS */
        .social-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill-btn { padding: 10px 22px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 100px; color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .pill-btn:hover { background: #fff; color: #000; border-color: #fff; transform: translateY(-2px); }

        /* GNOME CLOSE ICON */
        .close-circle { 
            position: absolute; top: 25px; right: 25px; 
            width: 34px; height: 34px; border-radius: 50%; 
            background: rgba(255,255,255,0.06); border: none; 
            color: #fff; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 18px;
            transition: 0.2s;
        }
        .close-circle:hover { background: rgba(255,255,255,0.15); transform: rotate(90deg); }

        @media (max-width: 650px) {
            .modal-floating { flex-direction: column; text-align: center; padding: 30px; border-radius: 30px; }
            .modal-pfp { width: 180px; height: 180px; }
            .social-row { justify-content: center; }
        }
    </style>
</head>
<body>

const grid = document.getElementById('staffGrid');

team.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'staff-card';
    card.style.setProperty('--user-color', m.color);
    card.onclick = () => showModal(i);
    card.innerHTML = `
        <img src="${m.pfp}" class="card-pfp">
        <span class="card-rank">${m.rank}</span>
        <h3>${m.name}</h3>
    `;
    grid.appendChild(card);
});

function showModal(id) {
    const m = team[id];
    const container = document.getElementById('modalContainer');
    document.documentElement.style.setProperty('--modal-color', m.color);
    
    let socialHTML = m.socials ? `<div class="social-row">${m.socials.map(s => `<a href="${s.l}" target="_blank" class="pill-btn">${s.n}</a>`).join('')}</div>` : '';

    container.innerHTML = `
        <div class="modal-floating">
            <button class="close-circle" onclick="closeModal()">&times;</button>
            <div class="modal-pfp-wrap">
                <img src="${m.pfp}" class="modal-pfp">
            </div>
            <div class="modal-info">
                <span class="modal-rank">${m.rank}</span>
                <h2 class="modal-name">${m.name}</h2>
                <p class="modal-bio">${m.bio}</p>
                ${socialHTML}
            </div>
        </div>
    `;
    
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'grid';
    setTimeout(() => overlay.classList.add('active'), 10);
}

function closeModal() { 
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('active');
    setTimeout(() => overlay.style.display = 'none', 400); 
}

window.onload = () => document.body.classList.add('loaded');
