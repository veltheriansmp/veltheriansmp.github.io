<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #FEF7FF; color: #1C1B1F; }
        .m3-rail { background-color: #F3EDF7; border-right: 1px solid #CAC4D0; }
        .m3-card { background-color: #F3EDF7; border-radius: 28px; transition: all 200ms; }
        .m3-card:hover { background-color: #EADDFF; }
        .active-icon { background-color: #EADDFF; color: #21005D; border-radius: 100px; }
    </style>
</head>
<body class="flex min-h-screen">

    <nav class="m3-rail w-24 flex flex-col items-center py-6 gap-8 shrink-0">
        <span class="material-symbols-outlined cursor-pointer text-[#49454F]">menu</span>
        <button class="w-14 h-14 bg-[#EADDFF] text-[#21005D] rounded-2xl flex items-center justify-center shadow-md">
            <span class="material-symbols-outlined">edit</span>
        </button>
        <div class="flex flex-col gap-6 mt-4 w-full items-center">
            <div class="flex flex-col items-center gap-1">
                <div class="active-icon px-5 py-1"><span class="material-symbols-outlined">home</span></div>
                <span class="text-[11px] font-medium">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-[#49454F]">
                <span class="material-symbols-outlined">star</span>
                <span class="text-[11px] font-medium">Events</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex justify-between items-center px-8">
            <span class="material-symbols-outlined text-[#49454F]">account_circle</span>
            <div class="flex items-center gap-6 text-[#49454F]">
                <span class="material-symbols-outlined">notifications</span>
                <span class="material-symbols-outlined">settings</span>
                <button onclick="document.getElementById('login-modal').classList.toggle('hidden')" class="bg-[#6750A4] text-white px-6 py-2 rounded-full text-sm font-medium">Login</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12">
            <h1 class="text-6xl font-normal mb-12">Cloudrend Hub</h1>
            
            <h2 class="text-2xl font-medium mb-8 flex items-center gap-4">Modules <span class="material-symbols-outlined">arrow_forward</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-8 mb-16">
                <script>
                    for(let i=1; i<=7; i++) {
                        document.write(`
                            <div class="flex flex-col items-center gap-3 group cursor-pointer">
                                <div class="w-20 h-20 bg-[#E6E1E5] rounded-full flex items-center justify-center group-hover:bg-[#EADDFF]">
                                    <div class="w-10 h-10 bg-[#CAC4D0] rotate-45"></div>
                                </div>
                                <span class="text-sm font-medium text-[#49454F]">Label ${i}</span>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="m3-card h-60 p-8 flex flex-col justify-end">
                    <h3 class="text-2xl font-bold">Postgres Online</h3>
                    <p class="text-sm text-[#49454F]">Neon instance connected via Vercel.</p>
                </div>
                <div class="m3-card h-60 p-8 flex flex-col justify-end">
                    <h3 class="text-2xl font-bold">Edge Config</h3>
                    <p class="text-sm text-[#49454F]">Running on Vercel Functions.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-[#F7F2FA] w-full max-w-sm rounded-[28px] p-8 shadow-2xl">
            <h2 class="text-2xl text-center mb-8">SMP Login</h2>
            <div class="space-y-4">
                <input id="u" type="text" placeholder="Minecraft Username" class="w-full h-14 border border-[#79747E] rounded-md bg-transparent px-4 outline-none focus:border-[#6750A4] focus:border-2">
                <input id="p" type="password" placeholder="Password" class="w-full h-14 border border-[#79747E] rounded-md bg-transparent px-4 outline-none focus:border-[#6750A4] focus:border-2">
                <button onclick="auth()" class="w-full h-12 bg-[#6750A4] text-white rounded-full font-medium">Sign In</button>
                <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="w-full h-12 text-[#6750A4]">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        async function auth() {
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u.value, password: p.value})
            });
            const data = await res.json();
            if (res.ok) {
                if (data.status === 'banned') alert('Banned: ' + data.ban_reason);
                else alert('Logged in as ' + data.username);
                location.reload();
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
