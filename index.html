<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { background-color: #FEF7FF; font-family: sans-serif; }
        .m3-rail { background-color: #F3EDF7; }
        .m3-card { background-color: #F3EDF7; border-radius: 28px; }
        /* Simple Spinner Animation */
        .spinner { border: 4px solid #EADDFF; border-top: 4px solid #6750A4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] bg-[#FEF7FF] flex flex-col items-center justify-center gap-4">
        <div class="spinner"></div>
        <p class="text-[#6750A4] font-medium animate-pulse">Checking session...</p>
    </div>

    <div id="banned-screen" class="hidden fixed inset-0 z-[90] bg-[#FFF8F7] flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-md space-y-6">
            <span class="material-symbols-outlined text-[#BA1A1A] text-7xl">gavel</span>
            <h1 class="text-4xl font-normal text-[#1C1B1F]">You are banned from the SMP</h1>
            <div class="m3-card p-6 border border-[#BA1A1A]/20">
                <p id="ban-reason" class="text-[#410002] font-mono text-sm">Loading reason...</p>
            </div>
            <button onclick="logout()" class="px-8 py-3 bg-[#BA1A1A] text-white rounded-full font-medium">Log Out</button>
        </div>
    </div>

    <nav class="m3-rail w-24 flex flex-col items-center py-6 gap-8 border-r border-[#CAC4D0]">
        <span class="material-symbols-outlined text-[#49454F] cursor-pointer">menu</span>
        <div class="w-14 h-14 bg-[#EADDFF] text-[#21005D] rounded-2xl flex items-center justify-center shadow-sm">
            <span class="material-symbols-outlined">edit</span>
        </div>
        <div class="flex flex-col gap-6 mt-4 items-center w-full">
            <div class="flex flex-col items-center gap-1 text-[#21005D]">
                <div class="bg-[#EADDFF] px-5 py-1 rounded-full"><span class="material-symbols-outlined">home</span></div>
                <span class="text-[11px] font-bold">Home</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex justify-between items-center px-8">
            <span class="material-symbols-outlined text-[#49454F]">account_circle</span>
            <div id="auth-zone">
                <button onclick="openModal()" class="bg-[#6750A4] text-white px-6 py-2 rounded-full text-sm font-medium">Login</button>
            </div>
        </header>

        <div class="p-12">
            <h1 class="text-6xl font-normal text-[#1C1B1F] mb-12">Label</h1>
            <div class="grid grid-cols-2 md:grid-cols-7 gap-8 mb-16">
                <div class="flex flex-col items-center gap-3"><div class="w-20 h-20 bg-[#E6E1E5] rounded-full"></div><span class="text-xs">Label</span></div>
                <div class="flex flex-col items-center gap-3"><div class="w-20 h-20 bg-[#E6E1E5] rounded-full"></div><span class="text-xs">Label</span></div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div class="bg-[#F7F2FA] w-full max-w-sm rounded-[28px] p-8 shadow-2xl">
            <h2 class="text-2xl text-center mb-8 font-normal">SMP Login</h2>
            <div class="space-y-4">
                <input id="user-input" type="text" placeholder="Username" class="w-full h-14 border border-[#79747E] rounded-lg bg-transparent px-4 outline-none focus:border-2 focus:border-[#6750A4]">
                <input id="pass-input" type="password" placeholder="Password" class="w-full h-14 border border-[#79747E] rounded-lg bg-transparent px-4 outline-none focus:border-2 focus:border-[#6750A4]">
                <button onclick="handleLogin()" class="w-full h-12 bg-[#6750A4] text-white rounded-full font-medium">Sign In</button>
                <button onclick="closeModal()" class="w-full h-12 text-[#6750A4] font-medium">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Core logic to get you out of the spinner hell
        const loader = document.getElementById('loader');
        const bannedScreen = document.getElementById('banned-screen');

        window.onload = () => {
            const session = localStorage.getItem('smp_session');
            if (session) {
                const user = JSON.parse(session);
                checkStatus(user);
            } else {
                loader.classList.add('hidden'); // No session, just show home
            }
        };

        function checkStatus(user) {
            if (user.status === 'banned') {
                document.getElementById('ban-reason').innerText = user.ban_reason || "No reason specified.";
                bannedScreen.classList.remove('hidden');
            } else {
                document.getElementById('auth-zone').innerHTML = `
                    <div class="flex items-center gap-3 bg-[#EADDFF] px-4 py-1 rounded-full">
                        <span class="text-xs font-bold text-[#21005D]">${user.username}</span>
                        <button onclick="logout()" class="material-symbols-outlined text-sm">logout</button>
                    </div>`;
            }
            loader.classList.add('hidden');
        }

        async function handleLogin() {
            const username = document.getElementById('user-input').value;
            const password = document.getElementById('pass-input').value;
            
            // Toggle loader while fetching
            loader.classList.remove('hidden');
            
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('smp_session', JSON.stringify(data));
                    location.reload();
                } else {
                    alert(data.error);
                    loader.classList.add('hidden');
                }
            } catch (e) {
                alert("Database connection failed. Check your Vercel logs.");
                loader.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('smp_session');
            location.reload();
        }

        function openModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('login-modal').classList.add('hidden'); }
    </script>
</body>
</html>
