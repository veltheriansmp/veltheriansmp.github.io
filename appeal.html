<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudrend SMP Appeal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    :root {
      --primary: #7C3AED;
      --surface: #F5F3FF;
      --card: #FFFFFF;
      --border: #E5E0F5;
      --text: #1C1B2E;
      --muted: #6B7280;
      --error: #DC2626;
      --error-bg: #FEE2E2;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { min-height:100vh; font-family:'Nunito',sans-serif; background:var(--surface); color:var(--text); display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:540px; background:var(--card); border:1px solid var(--border); border-radius:24px; box-shadow:0 18px 40px rgba(0,0,0,0.06); padding:32px; }
    h1 { font-family:'Syne',sans-serif; font-size:26px; margin-bottom:14px; }
    p { line-height:1.6; color:var(--muted); margin-bottom:18px; }
    .buttons { display:flex; flex-wrap:wrap; gap:12px; }
    .btn { border:none; border-radius:100px; font-weight:700; padding:12px 18px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text); }
    .btn-secondary { background:#F3F4F6; color:var(--text); }
    .input { width:100%; border:1.5px solid var(--border); border-radius:14px; padding:12px 14px; font-size:14px; color:var(--text); background:var(--surface); outline:none; margin-top:6px; }
    .input:focus { border-color:var(--primary); background:#fff; }
    .label { display:block; margin-bottom:14px; font-size:13px; color:var(--text); }
    .label span { display:block; margin-bottom:8px; font-weight:700; }
    .note { background:var(--error-bg); color:var(--error); border-radius:14px; padding:14px; margin-top:20px; }
    .note.success { background:#D1FAE5; color:#0F766E; }
    a { color:inherit; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ban Appeal</h1>
    <p>If you believe your ban is unfair, submit an appeal below. Your request will be forwarded to Discord staff through the configured webhook.</p>
    <form id="appeal-form">
      <label class="label"><span>Username</span><input id="appeal-username" class="input" name="username" required placeholder="Your Cloudrend SMP username" /></label>
      <label class="label"><span>Discord handle</span><input id="appeal-discord" class="input" name="discord" placeholder="Example#1234" /></label>
      <label class="label"><span>Email address</span><input id="appeal-email" class="input" name="email" placeholder="you@example.com" /></label>
      <label class="label"><span>Appeal message</span><textarea id="appeal-message" class="input" name="message" rows="6" required placeholder="Explain why your ban should be reviewed."></textarea></label>
      <div class="buttons">
        <button type="submit" class="btn btn-primary"><span class="material-symbols-rounded">send</span>Send appeal</button>
        <button type="button" class="btn btn-secondary" onclick="window.open('https://discord.gg/your-server','_blank')"><span class="material-symbols-rounded">chat</span>Appeal on Discord</button>
        <a class="btn btn-outline" href="/" style="text-decoration:none;"><span class="material-symbols-rounded">home</span>Back to home</a>
      </div>
      <p id="appeal-status" class="note" style="display:none;"></p>
    </form>
  </div>
  <script>
    const appealForm = document.getElementById('appeal-form');
    const statusEl = document.getElementById('appeal-status');

    function setAppealStatus(message, success = false) {
      statusEl.textContent = message;
      statusEl.className = success ? 'note success' : 'note';
      statusEl.style.display = 'block';
    }

    appealForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.style.display = 'none';
      const payload = {
        username: document.getElementById('appeal-username').value.trim(),
        discord: document.getElementById('appeal-discord').value.trim(),
        email: document.getElementById('appeal-email').value.trim(),
        message: document.getElementById('appeal-message').value.trim(),
      };

      try {
        const res = await fetch('/api/appeal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unable to send appeal.');
        setAppealStatus('Your appeal has been sent to staff.', true);
        appealForm.reset();
      } catch (err) {
        setAppealStatus(err.message || 'Failed to send appeal.');
      }
    });
  </script>
</body>
</html>
